# Docker Compose für LAN-only Betrieb (ohne HTTPS/Traefik)
# Nutzung: docker compose -f docker-compose.local.yml up -d

services:
  finanzmanager:
    image: 192.168.178.30:5000/finanzmanager:latest
    container_name: finanzmanager
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Berlin
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
