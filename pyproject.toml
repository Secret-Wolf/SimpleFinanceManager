# Tooling config for the Finanzmanager backend (Python).
# Lint:   ruff check backend
# Format: ruff format backend
# Test:   pytest

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["backend"]
extend-exclude = ["backend/venv", "data", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = [
    "E501",  # line length — left to the formatter, not a CI failure
    "E711",  # `== None` is required by SQLAlchemy filter expressions
    "E712",  # `== True` / `== False` is required by SQLAlchemy filter expressions
    "B008",  # function call in arg default — FastAPI's `Depends(...)` pattern
]

[tool.pytest.ini_options]
pythonpath = ["backend"]
testpaths = ["backend/tests"]
addopts = "-q"
